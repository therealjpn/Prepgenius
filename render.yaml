databases:
  - name: prepgenius-db
    plan: free
    databaseName: prepgenius
    user: prepgenius

services:
  - type: web
    name: prepgenius-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prepgenius-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALOC_ACCESS_TOKEN
        value: ALOC-1c8d5c2dd620ee669791
      - key: NODE_ENV
        value: production
      - key: SQUAD_PUBLIC_KEY
        sync: false
      - key: SQUAD_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: prepgenius-web
          type: web
          property: url

  - type: web
    name: prepgenius-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: prepgenius-api
          type: web
          property: url
      - key: NEXT_PUBLIC_SITE_URL
        fromService:
          name: prepgenius-web
          type: web
          property: url
