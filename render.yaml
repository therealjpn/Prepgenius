databases:
  - name: prepgenie-db
    plan: free
    databaseName: prepgenie
    user: prepgenie

services:
  - type: web
    name: prepgenie-api
    runtime: node
    plan: starter              # $7/mo — always on, no cold starts
    rootDir: apps/api
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/main.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prepgenie-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ALOC_ACCESS_TOKEN
        sync: false
      - key: NODE_ENV
        value: production
      - key: SQUAD_PUBLIC_KEY
        sync: false
      - key: SQUAD_SECRET_KEY
        sync: false
      - key: FRONTEND_URL
        fromService:
          name: prepgenie-web
          type: web
          property: url

  - type: web
    name: prepgenie-web
    runtime: node
    plan: starter              # $7/mo — always on
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: prepgenie-api
          type: web
          property: url
      - key: NEXT_PUBLIC_SITE_URL
        fromService:
          name: prepgenie-web
          type: web
          property: url
